<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Microsoft Office Proficiency Exam - Beginner to Intermediate">
    <title>Office Proficiency Exam</title>
    
    <!-- Using pinned versions for better caching and reliability -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@0.321.0/dist/umd/lucide.min.js"></script>

    <style>
        body { background-color: #f8fafc; margin: 0; padding: 0; min-height: 100vh; }
        .tab-active { background-color: #2563eb; color: white; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2); }
        
        /* Initial loading screen to prevent white flash while Babel compiles */
        #loader {
            position: fixed;
            inset: 0;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.4s ease-out;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2563eb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- Simple loader that React will remove -->
    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 1rem; color: #64748b; font-family: sans-serif; font-size: 0.875rem;">Initializing Exam Environment...</p>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        /**
         * Optimized Icon component.
         * Leverages Lucide's browser-side rendering with attribute-based targeting.
         */
        const Icon = ({ name, className }) => {
            const spanRef = React.useRef(null);

            React.useEffect(() => {
                if (spanRef.current && window.lucide) {
                    // Convert CamelCase to kebab-case for Lucide compatibility
                    const kebabName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    
                    spanRef.current.innerHTML = '';
                    const iElem = document.createElement('i');
                    iElem.setAttribute('data-lucide', kebabName);
                    if (className) iElem.className = className;
                    spanRef.current.appendChild(iElem);
                    
                    window.lucide.createIcons({
                        nameAttr: 'data-lucide',
                        attrs: { class: className }
                    });
                }
            }, [name, className]);

            return <span ref={spanRef} className="inline-flex items-center justify-center pointer-events-none" />;
        };

        const App = () => {
            // Remove the hard-coded HTML loader once React starts
            React.useEffect(() => {
                const loader = document.getElementById('loader');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.remove(), 400);
                }
            }, []);

            // --- Exam Data Configuration ---
            const examData = [
                {
                    id: 'theory',
                    title: 'General IT Theory',
                    icon: 'BookOpen',
                    questions: [
                        { id: 1, text: "Which file extension is typically associated with a Microsoft Word document?", options: [".txt", ".docx", ".xlsx", ".pptx"], correct: 1, marks: 5 },
                        { id: 2, text: "What is the keyboard shortcut to 'Undo' the last action?", options: ["Ctrl + C", "Ctrl + V", "Ctrl + Z", "Ctrl + S"], correct: 2, marks: 5 },
                        { id: 3, text: "Which tab in the Ribbon contains the 'Print' options in most Office apps?", options: ["Home", "Insert", "File", "Review"], correct: 2, marks: 5 },
                        { id: 4, text: "What is the main purpose of Microsoft Outlook?", options: ["Database Management", "Email and Calendar", "Photo Editing", "Web Hosting"], correct: 1, marks: 5 },
                    ]
                },
                {
                    id: 'word',
                    title: 'Microsoft Word',
                    icon: 'FileText',
                    questions: [
                        { id: 5, text: "To create a 'Table of Contents' automatically, what must you apply to your headings?", options: ["Bold Formatting", "Heading Styles", "Bullet Points", "Hyperlinks"], correct: 1, marks: 8 },
                        { id: 6, text: "Which feature allows you to send a personalized letter to a large list of recipients?", options: ["Track Changes", "Mail Merge", "Macro Recorder", "Format Painter"], correct: 1, marks: 7 },
                        { id: 7, text: "Where would you go to change the page orientation from Portrait to Landscape?", options: ["Design Tab", "Layout Tab", "View Tab", "Insert Tab"], correct: 1, marks: 5 },
                        { id: 8, text: "What is the function of the 'Format Painter'?", options: ["To paint pictures", "To copy formatting from one place to another", "To change the page color", "To check spelling"], correct: 1, marks: 5 },
                    ]
                },
                {
                    id: 'excel',
                    title: 'Microsoft Excel',
                    icon: 'BarChart2',
                    questions: [
                        { id: 9, text: "Which formula correctly uses an Absolute Reference?", options: ["=A1+B1", "=$A$1+B1", "=(A1+B1)", "=SUM(A:B)"], correct: 1, marks: 8 },
                        { id: 10, text: "What does the VLOOKUP function do?", options: ["Calculates the average", "Searches for a value in the first column of a table", "Sums a range of vertical cells", "Creates a chart"], correct: 1, marks: 7 },
                        { id: 11, text: "Which tool is best for summarizing and analyzing large datasets in Excel?", options: ["Data Validation", "PivotTable", "Conditional Formatting", "Goal Seek"], correct: 1, marks: 10 },
                        { id: 12, text: "How do you start a formula in Excel?", options: ["@", "#", "=", "/"], correct: 2, marks: 5 },
                    ]
                },
                {
                    id: 'powerpoint',
                    title: 'Microsoft PowerPoint',
                    icon: 'Monitor',
                    questions: [
                        { id: 13, text: "Which view allows you to see all your slides as thumbnails to easily reorder them?", options: ["Normal View", "Slide Sorter", "Reading View", "Notes Page"], correct: 1, marks: 5 },
                        { id: 14, text: "What is a 'Slide Master' used for?", options: ["To present the slideshow", "To set consistent formatting across all slides", "To record audio", "To print handouts"], correct: 1, marks: 10 },
                        { id: 15, text: "How do you add motion effects to individual elements on a slide?", options: ["Transitions", "Animations", "Design Ideas", "SmartArt"], correct: 1, marks: 5 },
                        { id: 16, text: "Which key starts a presentation from the beginning?", options: ["F1", "F5", "F10", "Spacebar"], correct: 1, marks: 5 },
                    ]
                }
            ];

            const [activeSheet, setActiveSheet] = React.useState(0);
            const [studentName, setStudentName] = React.useState('');
            const [isExamStarted, setIsExamStarted] = React.useState(false);
            const [isExamFinished, setIsExamFinished] = React.useState(false);
            const [responses, setResponses] = React.useState({});

            React.useEffect(() => {
                const initialResponses = {};
                examData.forEach(sheet => {
                    sheet.questions.forEach(q => {
                        initialResponses[q.id] = { selected: null, attempts: 0, locked: false, isCorrect: false };
                    });
                });
                setResponses(initialResponses);
            }, []);

            const handleAnswerSelection = (question, optionIndex) => {
                const qId = question.id;
                const current = responses[qId];
                if (current.locked) return;

                const isCorrect = optionIndex === question.correct;
                const newAttempts = current.attempts + 1;
                const shouldLock = isCorrect || newAttempts >= 3;

                setResponses(prev => ({
                    ...prev,
                    [qId]: { selected: optionIndex, attempts: newAttempts, locked: shouldLock, isCorrect: isCorrect }
                }));
            };

            const calculateScore = () => {
                let total = 0;
                examData.forEach(sheet => {
                    sheet.questions.forEach(q => {
                        if (responses[q.id]?.isCorrect) total += q.marks;
                    });
                });
                return total;
            };

            if (!isExamStarted) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="max-w-md w-full bg-white rounded-3xl shadow-2xl p-8 border border-slate-100">
                            <div className="text-center mb-10">
                                <div className="bg-blue-600 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-blue-200">
                                    <Icon name="Monitor" className="text-white w-10 h-10" />
                                </div>
                                <h1 className="text-3xl font-extrabold text-slate-800 tracking-tight">Skill Exam</h1>
                                <p className="text-slate-400 font-medium mt-1 uppercase tracking-widest text-xs">Office Proficiency Level</p>
                            </div>
                            <div className="space-y-6">
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Student Full Name</label>
                                    <input 
                                        type="text" 
                                        autoFocus
                                        className="w-full px-5 py-4 rounded-xl border-2 border-slate-100 outline-none focus:border-blue-500 transition-all text-lg font-medium"
                                        placeholder="Enter name to begin..."
                                        value={studentName}
                                        onChange={(e) => setStudentName(e.target.value)}
                                    />
                                </div>
                                <button 
                                    disabled={!studentName.trim()}
                                    onClick={() => setIsExamStarted(true)}
                                    className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-slate-200 text-white font-bold py-4 rounded-xl transition-all shadow-lg active:scale-95 text-lg"
                                >
                                    Start Examination
                                </button>
                                <p className="text-center text-[10px] text-slate-400 font-medium leading-relaxed">
                                    This session is being recorded for auto-marking. <br/>You have 3 attempts per question.
                                </p>
                            </div>
                        </div>
                    </div>
                );
            }

            if (isExamFinished) {
                const finalScore = calculateScore();
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="max-w-2xl w-full bg-white rounded-3xl shadow-2xl p-12 text-center border border-slate-100">
                            <div className={`w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-8 ${finalScore >= 50 ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}`}>
                                <Icon name="Trophy" className="w-12 h-12" />
                            </div>
                            <h2 className="text-4xl font-black text-slate-800">Final Report</h2>
                            <p className="text-slate-400 mt-2 text-lg">Completed by: <span className="text-slate-700 font-bold">{studentName}</span></p>
                            
                            <div className="mt-10 grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="p-8 bg-slate-50 rounded-2xl border border-slate-100">
                                    <p className="text-slate-400 uppercase tracking-widest text-xs font-black">Score Achieved</p>
                                    <p className="text-6xl font-black text-slate-800 mt-2">{finalScore}<span className="text-2xl text-slate-300">/100</span></p>
                                </div>
                                <div className="p-8 bg-slate-50 rounded-2xl border border-slate-100 flex flex-col justify-center">
                                    <p className="text-slate-400 uppercase tracking-widest text-xs font-black">Status</p>
                                    <p className={`text-3xl font-black mt-2 ${finalScore >= 50 ? 'text-green-600' : 'text-red-600'}`}>
                                        {finalScore >= 50 ? 'PASSED' : 'RETRY'}
                                    </p>
                                </div>
                            </div>
                            
                            <button onClick={() => window.location.reload()} className="mt-12 flex items-center justify-center gap-2 mx-auto text-blue-600 font-black hover:text-blue-800 transition-colors uppercase tracking-widest text-sm">
                                <Icon name="RotateCcw" className="w-4 h-4" /> Restart Session
                            </button>
                        </div>
                    </div>
                );
            }

            const currentSheet = examData[activeSheet];

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-sm backdrop-blur-md bg-white/90">
                        <div className="flex items-center gap-4">
                            <div className="bg-blue-600 p-2.5 rounded-xl text-white shadow-lg shadow-blue-100">
                                <Icon name="Monitor" className="w-6 h-6" />
                            </div>
                            <div className="hidden sm:block">
                                <h2 className="font-black text-slate-800 leading-none">Office Exam</h2>
                                <p className="text-[10px] text-slate-400 mt-1 uppercase font-bold tracking-widest">{studentName}</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                             <div className="hidden md:block text-right mr-4">
                                <p className="text-[10px] text-slate-400 font-black uppercase tracking-tighter">Overall Progress</p>
                                <div className="w-32 h-1.5 bg-slate-100 rounded-full mt-1 overflow-hidden">
                                    <div className="h-full bg-blue-500" style={{width: `${(Object.values(responses).filter(r => r.locked).length / 16) * 100}%`}}></div>
                                </div>
                            </div>
                            <button 
                                onClick={() => setIsExamFinished(true)} 
                                className="bg-slate-900 hover:bg-black text-white px-6 py-2.5 rounded-xl font-bold text-sm transition-all shadow-xl active:scale-95"
                            >
                                Finalize Exam
                            </button>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto w-full mt-8 px-4 flex-grow">
                        <nav className="flex flex-wrap gap-2 mb-10 bg-white p-2 rounded-2xl border border-slate-200 shadow-sm overflow-x-auto">
                            {examData.map((sheet, index) => (
                                <button
                                    key={sheet.id}
                                    onClick={() => setActiveSheet(index)}
                                    className={`flex-1 min-w-[140px] flex items-center justify-center gap-3 py-3 rounded-xl font-bold transition-all ${activeSheet === index ? 'tab-active' : 'text-slate-500 hover:bg-slate-50'}`}
                                >
                                    <Icon name={sheet.icon} className="w-5 h-5" />
                                    <span className="text-sm">{sheet.title}</span>
                                </button>
                            ))}
                        </nav>

                        <div className="space-y-8 pb-32">
                            {currentSheet.questions.map((q, idx) => {
                                const state = responses[q.id] || {};
                                return (
                                    <div key={q.id} className={`bg-white rounded-3xl p-8 border-2 transition-all duration-300 ${state.locked ? 'opacity-60 border-slate-100 grayscale-[0.3]' : 'border-white shadow-2xl shadow-slate-200/40'}`}>
                                        <div className="flex justify-between items-start mb-6 gap-6">
                                            <div className="flex gap-5">
                                                <span className="flex-shrink-0 flex items-center justify-center w-10 h-10 rounded-2xl bg-slate-100 text-slate-800 font-black text-sm">
                                                    {idx + 1}
                                                </span>
                                                <h4 className="text-xl font-bold text-slate-800 pt-1 leading-tight">{q.text}</h4>
                                            </div>
                                            <span className="flex-shrink-0 text-[10px] font-black text-blue-600 bg-blue-50 px-3 py-1.5 rounded-lg border border-blue-100 tracking-tighter">
                                                {q.marks} MARKS
                                            </span>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 pl-0 md:pl-14">
                                            {q.options.map((option, oIdx) => (
                                                <button
                                                    key={oIdx}
                                                    disabled={state.locked}
                                                    onClick={() => handleAnswerSelection(q, oIdx)}
                                                    className={`text-left px-6 py-4 rounded-2xl border-2 transition-all flex items-center justify-between font-bold
                                                        ${state.selected === oIdx ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-slate-50 bg-slate-50/50 hover:border-slate-200 hover:bg-white'}
                                                        ${state.locked && state.selected === oIdx ? (state.isCorrect ? 'border-green-500 bg-green-50 text-green-700' : 'border-red-500 bg-red-50 text-red-700') : ''}
                                                    `}
                                                >
                                                    <span>{option}</span>
                                                    {state.locked && state.selected === oIdx && (
                                                        state.isCorrect ? 
                                                        <Icon name="CheckCircle2" className="w-5 h-5 text-green-600" /> : 
                                                        <Icon name="AlertCircle" className="w-5 h-5 text-red-600" />
                                                    )}
                                                </button>
                                            ))}
                                        </div>
                                        <div className="mt-6 md:ml-14 flex items-center justify-between">
                                            <div className="flex items-center gap-4">
                                                <div className="flex gap-1.5">
                                                    {[1, 2, 3].map(dot => (
                                                        <div 
                                                            key={dot} 
                                                            className={`w-3 h-1 rounded-full transition-colors ${state.attempts >= dot ? (state.isCorrect ? 'bg-green-500' : 'bg-red-500') : 'bg-slate-200'}`}
                                                        />
                                                    ))}
                                                </div>
                                                <span className="text-[10px] text-slate-400 font-black uppercase tracking-widest">
                                                    Attempts: {state.attempts}/3
                                                </span>
                                            </div>
                                            {state.locked && (
                                                <span className={`text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full ${state.isCorrect ? 'text-green-600 bg-green-50' : 'text-red-500 bg-red-50'}`}>
                                                    {state.isCorrect ? 'Verified' : 'Finalized'}
                                                </span>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </main>

                    <footer className="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-slate-200 p-5 flex justify-center gap-6 z-50">
                        <button 
                            disabled={activeSheet === 0}
                            onClick={() => { setActiveSheet(activeSheet - 1); window.scrollTo(0,0); }}
                            className="px-8 py-3 rounded-2xl font-black text-slate-600 hover:bg-slate-100 disabled:opacity-20 transition-all flex items-center gap-3 active:scale-90"
                        >
                            <Icon name="ChevronLeft" className="w-5 h-5" /> Previous
                        </button>
                        <button 
                            disabled={activeSheet === examData.length - 1}
                            onClick={() => { setActiveSheet(activeSheet + 1); window.scrollTo(0,0); }}
                            className="px-8 py-3 rounded-2xl font-black text-slate-600 hover:bg-slate-100 disabled:opacity-20 transition-all flex items-center gap-3 active:scale-90"
                        >
                            Next <Icon name="ChevronRight" className="w-5 h-5" />
                        </button>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
